# Model & inference configuration
#
# ============================== DEMO MODE ==================================
# active_model/classes below currently point at a REAL trained 2-class demo
# model (small_flame, smoke), not the full 15-class production taxonomy.
# Trained on 141 images from LibreYOLO/fire-smoke-seg (CC BY 4.0, see
# docs/benchmark_report.md "Demo model" section for the full provenance,
# training command, and measured accuracy: mAP50=0.742 on a held-out test
# set). This lets the pipeline/dashboard actually run end to end today.
#
# To restore the production 15-class config once you've trained on a proper
# dataset: set active_model back to a yolov8n_fp32_640/yolov8n_int8_416/etc.
# entry built from your own training run, and restore the full `classes:`
# list (kept below, commented, for exactly this purpose).
# =============================================================================

active_model: "yolov8n_demo_fp16_416"

input_size: 416                  # 320 | 416 | 640 - must match the exported model below

classes:
  - small_flame
  - smoke

# PRODUCTION classes (restore this list + retrain when you have real data -
# see docs/model_comparison.md and docs/benchmark_report.md):
#  - small_flame
#  - large_flame
#  - smoke
#  - dense_smoke
#  - thin_smoke
#  - electrical_fire
#  - paper_fire
#  - wooden_fire
#  - curtain_fire
#  - plastic_fire
#  - short_circuit_spark
#  - fire_near_projector
#  - fire_near_podium
#  - fire_on_stage
#  - fire_near_exit_door
#
# NOTE: the last 5 "context" classes (fire_near_projector/podium/stage/exit_door) are best modeled
# as zone-based post-processing (bounding-box-in-ROI) rather than separate trained classes, since
# they are about scene location, not visual appearance. See inference/decision_engine.py ZoneMapper.
# They are kept here so the label set documents intent; training/dataset_prep.py collapses them to
# {flame, smoke} + a `zone` attribute at training time unless --keep-context-classes is passed.

models:
  yolov8n_demo_fp32_416:
    framework: "onnxruntime"
    weights: "weights/yolov8n_fire_fp32_416.onnx"
    input_size: 416
    precision: "fp32"

  yolov8n_demo_fp16_416:
    framework: "onnxruntime"
    weights: "weights/yolov8n_fire_fp16_416.onnx"
    input_size: 416
    precision: "fp16"

  yolov8n_demo_int8_416:
    framework: "onnxruntime"
    weights: "weights/yolov8n_fire_int8_416.onnx"
    input_size: 416
    precision: "int8"
    # WARNING: measured mAP50 0.264 vs 0.742 for fp32/fp16 on this demo model -
    # static PTQ with only 40 calibration images badly hurt accuracy on this
    # tiny model/dataset. Do not use for anything beyond a speed benchmark
    # until requantized with a larger, more representative calibration set.

  # Production model slots (point these at your own training/export.py output):
  yolov8n_fp32_640:
    framework: "onnxruntime"
    weights: "weights/yolov8n_fire_fp32_640.onnx"
    input_size: 640
    precision: "fp32"

  yolov8n_int8_320:
    framework: "onnxruntime"
    weights: "weights/yolov8n_fire_int8_320.onnx"
    input_size: 320
    precision: "int8"

inference:
  confidence_threshold: 0.45        # Per-frame minimum to even consider a detection
  nms_iou_threshold: 0.45
  max_detections: 20
  onnxruntime:
    intra_op_num_threads: 3
    inter_op_num_threads: 1
    execution_mode: "parallel"
    graph_optimization_level: "all"
    enable_cpu_mem_arena: true
    arena_extend_strategy: "kSameAsRequested"   # avoid arena growth churn on long-running 24/7 process

smoke_branch:
  enabled: true
  # Lightweight classical-CV + small classifier ensemble running on flame-detector's smoke class
  # plus a dedicated optical-flow/dark-channel smoke heuristic (see inference/smoke_detector.py)
  min_region_area_px: 900
  dark_channel_threshold: 0.35
  motion_diffusion_threshold: 0.12
